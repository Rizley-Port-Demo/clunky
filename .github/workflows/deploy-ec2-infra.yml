name: Deploy EC2 Infrastructure

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "us-east-1"
        type: string
      stack_name:
        description: "CloudFormation stack name"
        required: true
        default: "fastapi-ec2-stack"
        type: string
      action:
        description: "Deploy or destroy"
        required: true
        type: choice
        options:
          - deploy
          - destroy

jobs:
  deploy-ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:           aws-secret-access-key:           aws-region: 
      - name: Deploy stack
        if: inputs.action == 'deploy'
        run: |
          aws cloudformation deploy \
            --template-file .github/cloudformation/ec2-infra.yml \
            --stack-name \ \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Print stack outputs
        if: inputs.action == 'deploy'
        run: |
          aws cloudformation describe-stacks \
            --stack-name \ \
            --query "Stacks[0].Outputs" \
            --output table

      - name: Destroy stack
        if: inputs.action == 'destroy'
        run: |
          aws cloudformation delete-stack \
            --stack-name           echo "Waiting for deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name           echo "Stack deleted."
